<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />

    <!-- SEO -->
    <title>AppStoreCat — App Store & Play Store Analytics | Open Source</title>
    <meta name="description" content="Track store listings, monitor changes, analyze keywords, and discover trending apps across App Store and Google Play. Self-hosted and free forever." />
    <meta name="keywords" content="app store optimization, ASO, app intelligence, app analytics, iOS app tracking, Android app tracking, Google Play, App Store, keyword analysis, competitor tracking, open source, self-hosted, MCP" />
    <meta name="author" content="AppStoreCat" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://appstore.cat" />
    <meta name="theme-color" content="#0a0a0f" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AppStoreCat" />
    <meta property="og:title" content="AppStoreCat — App Store & Play Store Analytics | Open Source" />
    <meta property="og:description" content="Track store listings, monitor changes, analyze keywords, and discover trending apps across App Store and Google Play. Self-hosted and free forever." />
    <meta property="og:url" content="https://appstore.cat" />
    <meta property="og:image" content="https://appstore.cat/screenshots/hero-dashboard.jpeg" />
    <meta property="og:image:width" content="1264" />
    <meta property="og:image:height" content="868" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AppStoreCat — App Store & Play Store Analytics | Open Source" />
    <meta name="twitter:description" content="Track store listings, monitor changes, analyze keywords, and discover trending apps across App Store and Google Play. Self-hosted and free forever." />
    <meta name="twitter:image" content="https://appstore.cat/screenshots/hero-dashboard.jpeg" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" href="/appstorecat-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "AppStoreCat",
      "description": "Open source app intelligence toolkit. Track store listings, monitor changes, analyze keywords, and discover trending apps across App Store and Google Play.",
      "url": "https://appstore.cat",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "license": "https://github.com/appstorecat/appstorecat/blob/master/LICENSE",
      "isAccessibleForFree": true,
      "image": "https://appstore.cat/screenshots/hero-dashboard.jpeg",
      "screenshot": "https://appstore.cat/screenshots/hero-dashboard.jpeg",
      "featureList": [
        "Trending Charts",
        "App Discovery",
        "Store Listing Tracking",
        "Ratings & Reviews",
        "Keyword Density Analysis",
        "Change Detection",
        "Competitor Tracking",
        "Publisher Discovery",
        "MCP Server (AI-ready)",
        "Self-hosted"
      ],
      "softwareHelp": {
        "@type": "WebPage",
        "url": "https://github.com/appstorecat/appstorecat/blob/master/docs/en/getting-started/installation.md"
      },
      "codeRepository": "https://github.com/appstorecat/appstorecat"
    }
    </script>

    <script src="/config.js"></script>
    <script>
      (function() {
        var theme = localStorage.getItem('theme') || 'system';
        var dark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
