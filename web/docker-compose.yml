# Frontend: React 19 + Vite
services:
    frontend:
        build:
            context: .
            dockerfile: .docker/Dockerfile
        ports:
            - '${FRONTEND_PORT:-7461}:7461'
        volumes:
            - '.:/app'
            - '/app/node_modules'
        environment:
            - NODE_ENV=development
        networks:
            - appstorecat

networks:
    appstorecat:
        driver: bridge
